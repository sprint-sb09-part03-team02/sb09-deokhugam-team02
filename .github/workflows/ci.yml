name: CI

on:
  pull_request:
    branches: [ dev, main ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'deokhugam/docs/**'

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./deokhugam

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설치
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 캐시 설정
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: 빌드 및 테스트 실행
        run: ./gradlew clean test jacocoTestReport jacocoTestCoverageVerification
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: 테스트 결과 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: deokhugam/build/reports/tests/test/

      - name: 커버리지 리포트 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: deokhugam/build/reports/jacoco/test/html/

      - name: Codecov 업로드
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: deokhugam/build/reports/jacoco/test/jacocoTestReport.xml
          fail_ci_if_error: false
